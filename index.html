<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande de Carte Visa Virtuelle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: #1a73e8;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .badge {
            display: inline-block;
            background-color: #e8f0fe;
            color: #1a73e8;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 5px rgba(26, 115, 232, 0.2);
        }
        .btn {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #1557b0;
        }
        .footer-info {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }
        .contacts {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: #555;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Carte Visa Virtuelle</h1>
          
            <p>Remplissez ce formulaire pour enregistrer vos coordonnées et commander votre carte immédiatement.</p>
        </div>

        <form action="https://formspree.io/f/mgogyjpn" method="POST">
            
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required placeholder="Ex: Daniel">
            </div>

            <div class="form-group">
                <label for="prenom">Prénom(s) :</label>
                <input type="text" id="prenom" name="prenom" required placeholder="Ex: kone aziz">
            </div>

            <div class="form-group">
                <label for="naissance">Date de naissance :</label>
                <input type="date" id="naissance" name="naissance" required>
            </div>

            <div class="form-group">
                <label for="telephone">Numéro de Téléphone / WhatsApp :</label>
                <input type="tel" id="telephone" name="telephone" required placeholder="Ex: +242 06 000 00 00">
            </div>

            <!-- Redirection automatique vers votre WhatsApp après validation -->
            <input type="hidden" name="_next" value="https://wa.me/2250100107413?text=Bonjour,%20je%20viens%20de%20remplir%20le%20formulaire%20pour%20ma%20carte%20Visa.">

            <button type="submit" class="btn">Valider et Commander</button>
        </form>

        <div class="contacts">
            <p><strong>Infoline & WhatsApp :</strong></p>
            <p>🇨🇬 +242 06 558 86 86 / 🇨🇮 +225 01 00 107 413</p>
        </div>
        
        <div class="footer-info">
            --Sécurisé et confidentiel--
        </div>
    </div>

</body>
</html>
